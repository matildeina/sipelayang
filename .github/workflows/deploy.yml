name: Deploy ke Cloud Run Otomatis

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ets-cloud-matilde
  SERVICE_NAME: sipelayang-service
  REGION: asia-southeast2
  # Nama repository yang dibuat di Artifact Registry
  REPO_NAME: repo-sipelayang 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kode
        uses: actions/checkout@v4

      - name: Authenticate ke GCP
        uses: google-github-actions/auth@v2
        with:
          # Pastikan secret ini berisi JSON Key dari Service Account github-actions-deploy
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push to Artifact Registry
        run: |
          # Konfigurasi agar Docker bisa push ke GCP
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
          
          # Melakukan build di server GCP dan menyimpannya ke Artifact Registry
          # Tanpa --async agar step ini menunggu sampai build selesai
          gcloud builds submit --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/app-image:latest .

      - name: Deploy to Cloud Run
        run: |
          # Mengambil image yang baru saja dibuild untuk dideploy ke Cloud Run
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/app-image:latest \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:db-sipelayang-matilde \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --memory 512Mi \
            --timeout 300 \
            --allow-unauthenticated