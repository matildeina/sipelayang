name: Deploy ke Cloud Run Otomatis

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ets-cloud-matilde
  SERVICE_NAME: sipelayang-service
  REGION: asia-southeast2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kode
        uses: actions/checkout@v4

      - name: Authenticate ke GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push
        run: |
          gcloud auth configure-docker asia-southeast2-docker.pkg.dev --quiet
          # Gunakan --async biar gak kena error streaming log
          gcloud builds submit --tag asia-southeast2-docker.pkg.dev/${{ env.PROJECT_ID }}/repo-sipelayang/app-image:latest . --async

      - name: Deploy to Cloud Run
        run: |
          # Tunggu 60 detik biar build di sisi Google Cloud selesai sempurna
          echo "Menunggu build selesai di server Google..."
          sleep 60

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image asia-southeast2-docker.pkg.dev/${{ env.PROJECT_ID }}/repo-sipelayang/app-image:latest \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:asia-southeast2:db-sipelayang-matilde \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --memory 512Mi \
            --timeout 300 \
            --allow-unauthenticated
