name: Deploy ke Cloud Run Otomatis

on:
  push:
    branches:
      - main # Setiap Mane push ke branch main, dia otomatis jalan

env:
  PROJECT_ID: ets-cloud-matilde
  SERVICE_NAME: sipelayang-service
  REGION: asia-southeast2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kode
        uses: actions/checkout@v3

      - name: Authenticate ke GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build dan Push Docker Image
        run: |
          gcloud auth configure-docker asia-southeast2-docker.pkg.dev
          gcloud builds submit --tag asia-southeast2-docker.pkg.dev/${{ env.PROJECT_ID }}/repo-sipelayang/app-image:latest .

      - name: Deploy ke Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image asia-southeast2-docker.pkg.dev/${{ env.PROJECT_ID }}/repo-sipelayang/app-image:latest \
            --add-cloudsql-instances ets-cloud-matilde:asia-southeast2:db-sipelayang-matilde \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated
